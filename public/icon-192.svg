<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#FF8FB1"/>
    </linearGradient>
    <linearGradient id="beadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="192" height="192" rx="40" fill="url(#bgGradient)"/>

  <!-- 装饰圆点 -->
  <circle cx="40" cy="40" r="6" fill="#FFE66D" opacity="0.4"/>
  <circle cx="152" cy="40" r="4" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="40" cy="152" r="4" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="152" cy="152" r="6" fill="#FFE66D" opacity="0.4"/>

  <!-- 拼豆网格 (3x3) -->
  <!-- 第一行 -->
  <circle cx="60" cy="60" r="14" fill="#FFFFFF" stroke="#FF6B9D" stroke-width="2"/>
  <circle cx="96" cy="60" r="14" fill="url(#beadGradient)" stroke="#FF6B9D" stroke-width="2"/>
  <circle cx="132" cy="60" r="14" fill="#4ECDC4" stroke="#FF6B9D" stroke-width="2"/>

  <!-- 第二行 -->
  <circle cx="60" cy="96" r="14" fill="url(#beadGradient)" stroke="#FF6B9D" stroke-width="2"/>
  <circle cx="96" cy="96" r="14" fill="#FFFFFF" stroke="#FF6B9D" stroke-width="2"/>
  <circle cx="132" cy="96" r="14" fill="#FF6B6B" stroke="#FF6B9D" stroke-width="2"/>

  <!-- 第三行 -->
  <circle cx="60" cy="132" r="14" fill="#4ECDC4" stroke="#FF6B9D" stroke-width="2"/>
  <circle cx="96" cy="132" r="14" fill="#FF6B6B" stroke="#FF6B9D" stroke-width="2"/>
  <circle cx="132" cy="132" r="14" fill="url(#beadGradient)" stroke="#FF6B9D" stroke-width="2"/>
</svg>
