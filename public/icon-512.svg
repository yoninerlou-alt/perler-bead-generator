<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#FF8FB1"/>
    </linearGradient>
    <linearGradient id="beadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bgGradient)"/>

  <!-- 装饰圆点 -->
  <circle cx="106" cy="106" r="16" fill="#FFE66D" opacity="0.4"/>
  <circle cx="406" cy="106" r="11" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="106" cy="406" r="11" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="406" cy="406" r="16" fill="#FFE66D" opacity="0.4"/>

  <!-- 拼豆网格 (3x3) -->
  <!-- 第一行 -->
  <circle cx="160" cy="160" r="38" fill="#FFFFFF" stroke="#FF6B9D" stroke-width="5"/>
  <circle cx="256" cy="160" r="38" fill="url(#beadGradient)" stroke="#FF6B9D" stroke-width="5"/>
  <circle cx="352" cy="160" r="38" fill="#4ECDC4" stroke="#FF6B9D" stroke-width="5"/>

  <!-- 第二行 -->
  <circle cx="160" cy="256" r="38" fill="url(#beadGradient)" stroke="#FF6B9D" stroke-width="5"/>
  <circle cx="256" cy="256" r="38" fill="#FFFFFF" stroke="#FF6B9D" stroke-width="5"/>
  <circle cx="352" cy="256" r="38" fill="#FF6B6B" stroke="#FF6B9D" stroke-width="5"/>

  <!-- 第三行 -->
  <circle cx="160" cy="352" r="38" fill="#4ECDC4" stroke="#FF6B9D" stroke-width="5"/>
  <circle cx="256" cy="352" r="38" fill="#FF6B6B" stroke="#FF6B9D" stroke-width="5"/>
  <circle cx="352" cy="352" r="38" fill="url(#beadGradient)" stroke="#FF6B9D" stroke-width="5"/>
</svg>
