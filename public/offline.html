<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 - 拼豆图纸生成器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FFF9F0 0%, #FFFBF5 100%);
      color: #2D3436;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .offline-container {
      max-width: 500px;
      text-align: center;
      background: white;
      border-radius: 32px;
      padding: 48px 32px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
      border: 3px solid #FF6B9D;
    }

    .offline-emoji {
      font-size: 96px;
      margin-bottom: 24px;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .offline-title {
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      font-size: 32px;
      color: #FF6B9D;
      margin-bottom: 16px;
    }

    .offline-message {
      font-size: 16px;
      color: #636E72;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .offline-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 32px;
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-primary {
      background: #FF6B9D;
      color: white;
    }

    .btn-primary:hover {
      background: #FF5887;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 107, 157, 0.3);
    }

    .btn-secondary {
      background: #FFE66D;
      color: #2D3436;
    }

    .btn-secondary:hover {
      background: #FFD93D;
      transform: translateY(-2px);
    }

    .offline-hint {
      margin-top: 24px;
      padding: 16px;
      background: #FFF9F0;
      border-radius: 16px;
      font-size: 14px;
      color: #636E72;
    }

    .offline-hint strong {
      color: #FF6B9D;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-emoji">🔌</div>
    <h1 class="offline-title">哎呀，断网了~</h1>
    <p class="offline-message">
      看起来你当前处于离线状态。<br>
      不过别担心，已缓存的内容仍然可以使用！
    </p>
    <div class="offline-actions">
      <button class="btn btn-primary" onclick="window.location.reload()">🔄 重新加载</button>
      <button class="btn btn-secondary" onclick="window.location.href='/'">🏠 返回首页</button>
    </div>
    <div class="offline-hint">
      💡 <strong>提示：</strong> 拼豆图纸生成器支持离线使用，<br>
      你可以继续编辑已加载的图纸，或查看缓存的色号数据。
    </div>
  </div>
</body>
</html>
